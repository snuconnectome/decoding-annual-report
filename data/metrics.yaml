# 정합성 메모 (평가단 질의 대응 대비)
notes:
  evaluation_3_discrepancy: |
    5개년 평가기준(p13-15)의 평가항목 3 "뇌-환경 상호작용 과정에서
    정서에 의해 맥락화된 지각의 신경과학적 메커니즘 규명"(가중치 10%)은
    3차년도 목표가 명시되어 있으나("-동물: two-site 광유전학, 칼슘이미징을
    통하여 감각-정서의 직접적 인과관계 규명, -사람: 뇌전도, 기능성
    자기공명영상을 통한 단순/복합 자극의 감각-정서 상호작용 및 개인차
    확인"), 3차년도 성과 표(p87-88)에는 해당 평가항목 행이 누락되어 있음.

    이로 인해 3차년도 평가 대상 가중치가 원본 5개년 기준 90%(항목 1·2·3·4·5)에서
    3차년도 성과 표에서 100%(항목 1·2·4·5 재분배)로 변경됨.

    가능한 해석:
      (a) 평가항목 3이 3차년도 평가에서 제외·유보됨
      (b) 평가항목 3의 실적이 다른 항목과 통합 평가됨
      (c) 성과 표 작성 시 기재 누락

    평가단 발표 시 예상 질의 대비 필요.

  weight_reassignment: |
    원본 5개년 기준 가중치 20+20+20+20 = 80%인 4개 항목이 3차년도 성과
    표에서 25%×4 = 100%로 재분배됨. 이는 "연차별 active 항목의 가중치
    합이 100%가 되도록 재분배"하는 R&D 과제의 일반적 관행으로 해석됨.
