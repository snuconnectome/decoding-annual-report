# 3차년도 정성적 성과 (p87-88 기준)
year3_performance:
  - criterion_id: 1
    criterion_title: "정서에 의해 맥락화된 디코딩을 위한 뇌-환경 상호작용 데이터베이스 구축"
    weight_percent: 25          # 3차년도 성과 표 재분배 (원본 5개년 기준 20%)
    related_subgoals: ["1-1", "1-2"]
    year3_targets:
      - "고정된 환경 자극에서 동물의 지각, 정서 데이터 베이스 구축"
      - "단순/복합적 감정 자극에 대한 사람의 지각 데이터 베이스 구축"
    performance_summary: |
      [사람] 자연스러운 감정·지각 및 물체-환경·시공간 맥락 과제에서
      fMRI·EEG·시선추적 데이터를 대규모로 수집·전처리하고,
      감정-맥락 연합, 해마 하위영역 기반 물체-환경·시공간 기억,
      청소년 지각-공간 맥락 발달의 신경기제를 규명하여 정서 맥락화
      기반 지각 디코딩 모델 개발을 위한 핵심 데이터베이스와 분석
      프로토콜을 구축.
    achievement_percent: 100
    evidence_summary: null  # p87 해당 셀 비어있음

  - criterion_id: 2
    criterion_title: "감각 경험에 의해 발생하는 정서에 의해 맥락화된 지각의 디코딩을 위한 기계학습 모델 개발 및 검증"
    weight_percent: 25
    related_subgoals: ["1-3", "1-4"]
    year3_targets:
      - "행동 데이터와 신경 신호 데이터를 통합하는 기계학습 모델의 개발"
    performance_summary: |
      사람(movie fMRI–행동), 동물(칼슘이미징), 언어–뇌영상,
      주파수 기반 fMRI 등 총 4개 연구를 통해 뇌신호–행동을 통합하는
      sequence-to-sequence 디코딩 기반을 확립하였고, 정서·언어·인지
      예측에서 기존 방법 대비 유의한 성능 향상
      (SwiFT-IO R²=0.96, POYO-SSL +12~13%, 언어-뇌영상 +14.4%,
      MBBN SOTA)을 달성함.
    achievement_percent: 100
    evidence_summary: "국제 발표 1건, 리뷰 중 2편, 출판 예정 1편"

  - criterion_id: 4
    criterion_title: "동물, 사람 뇌영상-파운데이션 기계학습 모델 연구 개발 및 디코딩에 적용"
    weight_percent: 25
    related_subgoals: ["2-1", "2-2"]
    year3_targets:
      - "동일종 단일 입력 분포에서 정서에 의해 맥락화된 지각의 디코딩을 위한 기계학습모델 개발 및 검증"
    performance_summary: |
      총 5개 세부 연구를 수행하여 sMRI·fMRI·EEG·iEEG 등 다양한
      신경신호를 아우르는 멀티스케일 파운데이션 모델(SwiFT,
      DIVER-1, NeuroMamba) 및 편향 완화·정확도 향상 알고리즘,
      그리고 양자 시공간 학습 기반 차세대 신경 모델을 개발하였음.
      이를 통해 구조·기능·전기생리 신호의 공통 표현 학습 기반을
      마련하고, 신경 디코딩·임상예측·인지·정서 모델링에 적용 가능한
      동물–사람 종간 파운데이션 모델 구축의 핵심 기술적 토대를 확보함.
    achievement_percent: 100
    evidence_summary: "국제 발표 2건, 투고/리뷰 중 2편, 기술개발 1건"

  - criterion_id: 5   # NOTE: 원본 성과 표에서 평가항목 번호 명시 없이 연속 행으로 기재됨. 5개년 평가기준 기준으로는 항목 5.
    criterion_title: "다중 모달리티(휴지기, 과제 수행, 영화 감상, 자연스러운 자극)의 기능성 자기공명 영상 및 구조 자기공명 영상과 뇌전도 데이터 통합하는 기계학습 모델의 개발"
    weight_percent: 25
    related_subgoals: ["2-1", "2-2"]
    year3_targets:
      - "동일종 다중 입력 분포 · 다중 모달리티 통합 기계학습 모델"
    performance_summary: |
      총 2개의 세부 연구(대규모 뇌영상 기반 Vision-Language Model
      개발, 2D 자연 이미지 오토인코더 기반 fMRI 토크나이징·Transformer
      모델 개발)를 수행하여 동물–사람 종간 파운데이션 모델 구축을 위한
      핵심 기반 기술을 확립함. 이를 통해 대규모 sMRI·DTI·fMRI의 텍스트
      정렬(semantic alignment) 기반 표현 학습과, 장기 시계열 뇌영상
      분석을 가능하게 하는 효율적 토크나이징 및 Transformer 설계(TabLeT)를
      새롭게 제시하며, 종간 신경표상 연결을 위한 차세대 디코딩 모델의
      기반을 마련함.
    achievement_percent: 100
    evidence_summary: "학회 투고 1편, 기술개발 및 검증 완료 1건"

